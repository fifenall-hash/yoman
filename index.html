<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <!-- PWA 및 아이콘 설정 -->

    <link rel="icon" href="icon.ico" sizes="any">

    <style>
        body {
            margin: 0;

        }

        /* CSV 다운로드 버튼 스타일 */

            display: none;
            width: 100%;
            padding: 12px;
            margin-top: 30px;

            border: 1px solid #333;

</head>
<body>

    <div id="app">
        <header>
            <h1>지금 사요?</h1>
        </header>
        <div id="content" class="loading">
            <div style="margin-bottom: 15px;">주식 및 환율 데이터를 분석 중입니다...<br><span style="font-size: 12px; color: #666;">(야후 파이낸스 접속 중)</span></div>
            
            <!-- 미니게임 영역 -->
            <div id="game-container">
                <canvas id="gameCanvas" width="300" height="150"></canvas>
                <div id="scoreBoard">터치/클릭 점프 (더블 점프!) | 수익률: +0%</div>
            </div>
        </div>
        
        <button id="downloadBtn" class="btn-download">📊 데이터 확인용 CSV 다운로드</button>
    </div>

    <script>
        // PWA 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.error("SW 등록 실패:", err));
        }

        // 종목 및 매수(이하)/매도(이상) 이격 비율 고정값
        const STOCKS = [
            { symbol: 'TQQQ', buy: 1.5, sell: 3.0 },
            { symbol: 'TECL', buy: 1.5, sell: 3.5 },
            { symbol: 'SOXL', buy: 1.0, sell: 5.0 }
        ];

        function formatPrice(price, isKrw = false) {
            if (!price) return '데이터 없음';
            if (isKrw) {
                return Math.round(price).toLocaleString('ko-KR') + '원';
            } else {
                return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
        }

        // Yahoo Finance 데이터 패치
        async function fetchHistory(ticker) {
            const currentUnixTime = Math.floor(Date.now() / 1000); 
            const targetUrl1 = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=0&period2=${currentUnixTime}&interval=1d&events=history`;
            const targetUrl2 = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?period1=0&period2=${currentUnixTime}&interval=1d&events=history`;

            const proxyList = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl1)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl1)}`,
                `https://corsproxy.io/?${encodeURIComponent(targetUrl1)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl2)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl2)}`,
                `https://thingproxy.freeboard.io/fetch/${targetUrl1}`
            ];

            let history = [];
            for (let proxy of proxyList) {
                try {
                    const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                    if (response.ok) {
                        const textData = await response.text();
                        let data;
                        try {
                            data = JSON.parse(textData);
                        } catch (parseError) {
                            continue; 
                        }

                        if (data && data.chart && data.chart.result) { 
                            const result = data.chart.result[0];
                            const timestamps = result.timestamp;
                            const quotes = result.indicators.quote[0];
                            
                            const adjcloses = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : null;

                            if (timestamps && timestamps.length > 0) {
                                for (let i = 0; i < timestamps.length; i++) {
                                    let p = adjcloses ? adjcloses[i] : quotes.close[i];
                                    
                                    if (!p || p <= 0 || !Number.isFinite(p)) continue;

                                    const dateObj = new Date(timestamps[i] * 1000);
                                    const yyyy = dateObj.getUTCFullYear();
                                    const mm = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
                                    const dd = String(dateObj.getUTCDate()).padStart(2, '0');

                                    history.push({ date: `${yyyy}-${mm}-${dd}`, close: p });
                                }
                            }
                            if (history.length > 0) break; 
                        }
                    }
                } catch (error) {
                    console.warn(`Proxy fail:`, proxy, error);
                }
            }
            return history;
        }

        // 1500일 고정 주식 매매 상태 계산
        function calculateStockState(data, buyTarget, sellTarget, symbol) {
            const period = 1500;
            const historyLog = [];

            if (data.length < period) {
                return { 
                    state: `데이터 부족 (현재: ${data.length}일)`, 
                    currentPrice: data.length > 0 ? data[data.length - 1].close : null, 
                    historyLog 
                };
            }

            const prices = data.map(d => d.close);
            
            let isHolding = true; 
            let lastActionDateObj = new Date(data[period - 1].date);
            let lastActionType = "매수";
            let currentStateStr = "초기 보유 시작";

            for (let i = period - 1; i < data.length; i++) {
                const slice = prices.slice(i - period + 1, i + 1);
                const ma = slice.reduce((a, b) => a + b, 0) / period;
                
                const disparity = prices[i] / ma;
                let actionOccurred = false;

                if (i === period - 1) {
                    actionOccurred = true;
                    currentStateStr = "초기 보유 시작";
                    lastActionDateObj = new Date(data[i].date);
                } else {
                    if (isHolding && disparity >= sellTarget) {
                        isHolding = false;
                        lastActionType = "매도";
                        lastActionDateObj = new Date(data[i].date);
                        currentStateStr = "매도 (Sell)";
                        actionOccurred = true;
                    } 
                    else if (!isHolding && disparity <= buyTarget) {
                        isHolding = true;
                        lastActionType = "매수";
                        lastActionDateObj = new Date(data[i].date);
                        currentStateStr = "매수 (Buy)";
                        actionOccurred = true;
                    }
                }

                if (!actionOccurred) {
                    const currentDt = new Date(data[i].date);
                    const diffTime = Math.abs(currentDt - lastActionDateObj);
                    const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (diffDays >= 365) {
                        const diffYears = (diffDays / 365.2425).toFixed(2);
                        currentStateStr = `${lastActionType} 후 관망 (${diffYears}년차)`;
                    } else {
                        currentStateStr = `${lastActionType} 후 관망 (${diffDays}일차)`;
                    }
                }

                let evalState = '중립';
                if (symbol === 'TQQQ') {
                    if (disparity <= 1.6093) evalState = '심한 저평가';
                    else if (disparity <= 1.9971) evalState = '저평가';
                    else if (disparity <= 2.2958) evalState = '중립';
                    else if (disparity <= 2.9607) evalState = '과열';
                    else evalState = '심한 과열';
                } else if (symbol === 'TECL') {
                    if (disparity <= 1.7314) evalState = '심한 저평가';
                    else if (disparity <= 2.1225) evalState = '저평가';
                    else if (disparity <= 2.4379) evalState = '중립';
                    else if (disparity <= 3.0115) evalState = '과열';
                    else evalState = '심한 과열';
                } else if (symbol === 'SOXL') {
                    if (disparity <= 1.1588) evalState = '심한 저평가';
                    else if (disparity <= 1.7736) evalState = '저평가';
                    else if (disparity <= 2.5217) evalState = '중립';
                    else if (disparity <= 3.6264) evalState = '과열';
                    else evalState = '심한 과열';
                }

                historyLog.push({
                    date: data[i].date,
                    close: prices[i],
                    disp: disparity,
                    state: currentStateStr,
                    eval: evalState
                });
            }
            
            return { 
                state: historyLog[historyLog.length - 1].state, 
                evalState: historyLog[historyLog.length - 1].eval,
                currentPrice: prices[prices.length - 1], 
                historyLog 
            };
        }

        function getFastR2ForPeriod(prices, rawMulrimData, maxMulrim, period) {
            const N = prices.length;
            let validX = [], validY = [], sum = 0;
            for (let i = 0; i < N; i++) {
                sum += prices[i];
                if (i >= period) sum -= prices[i - period];
                if (i >= period - 1) {
                    let avg = sum / period;
                    if (avg > 0) {
                        let disparity = prices[i] / avg;
                        if ((N - 1) - i >= maxMulrim && Number.isFinite(disparity)) {
                            validX.push(disparity); validY.push(rawMulrimData[i]);
                        }
                    }
                }
            }
            if (validX.length < 30) return 0;
            let sumX = 0, sumY = 0;
            for (let i = 0; i < validX.length; i++) { sumX += validX[i]; sumY += validY[i]; }
            let meanX = sumX / validX.length, meanY = sumY / validY.length;
            let covXY = 0, varX = 0, varY = 0;
            for (let i = 0; i < validX.length; i++) {
                let dx = validX[i] - meanX, dy = validY[i] - meanY;
                covXY += dx * dy; varX += dx * dx; varY += dy * dy;
            }
            if (varX > 0 && varY > 0) return (covXY / Math.sqrt(varX * varY)) ** 2;
            return 0;
        }

        function calculateExchangeState(data) {
            const prices = data.map(d => d.close);
            const N = prices.length;
            if (N < 100) return { status: '데이터 부족', currentPrice: null, bestPeriod: 0, historyLog: [] };

            let rawMulrimData = new Array(N).fill(0);
            let maxMulrim = 0;
            for (let i = 0; i < N; i++) {
                let count = 0;
                let currentPrice = prices[i];
                for (let j = i + 1; j < N; j++) { if (prices[j] < currentPrice) count++; }
                rawMulrimData[i] = count;
                if (count > maxMulrim) maxMulrim = count;
            }

            const maxTestPeriod = Math.min(3000, N - maxMulrim - 30);
            let bestR2 = -1;
            let bestPeriod = 20; 
            if (maxTestPeriod >= 1) {
                for (let p = 1; p <= maxTestPeriod; p++) {
                    let r2 = getFastR2ForPeriod(prices, rawMulrimData, maxMulrim, p);
                    if (r2 > bestR2) {
                        bestR2 = r2;
                        bestPeriod = p;
                    }
                }
            }

            const historyLog = [];
            for (let i = bestPeriod - 1; i < N; i++) {
                const slice = prices.slice(i - bestPeriod + 1, i + 1);
                const ma = slice.reduce((a, b) => a + b, 0) / bestPeriod;
                const disparity = prices[i] / ma;
                
                let state = '관망';
                if (disparity <= 0.9831) state = '달러 환전 적극 권장!';
                else if (disparity <= 1.0206) state = '달러 환전 권장';
                else if (disparity <= 1.0594) state = '달러 환전 장려';
                else if (disparity <= 1.1042) state = '달러 환전 고려';
                else state = '관망';

                let evalState = '적정';
                if (disparity <= 0.9831) evalState = '저환율';
                else if (disparity > 1.1042) evalState = '고환율';

                historyLog.push({
                    date: data[i].date,
                    close: prices[i],
                    disp: disparity,
                    state: state,
                    eval: evalState
                });
            }

            const currentState = historyLog[historyLog.length - 1];
            return { 
                status: currentState.state, 
                evalState: currentState.eval,
                currentPrice: currentState.close,
                bestPeriod: bestPeriod,
                historyLog: historyLog
            };
        }

        function downloadCSV(stockResults, exState) {
            const dateMap = {};
            
            stockResults.forEach(stock => {
                if (!stock.historyLog) return;
                stock.historyLog.forEach(record => {
                    if (!dateMap[record.date]) dateMap[record.date] = { date: record.date };
                    dateMap[record.date][`${stock.symbol}_Price`] = record.close;
                    dateMap[record.date][`${stock.symbol}_Disp`] = record.disp;
                    dateMap[record.date][`${stock.symbol}_State`] = record.state;
                    dateMap[record.date][`${stock.symbol}_Eval`] = record.eval;
                });
            });

            if (exState && exState.historyLog) {
                exState.historyLog.forEach(record => {
                    if (!dateMap[record.date]) dateMap[record.date] = { date: record.date };
                    dateMap[record.date][`Exchange_Price`] = record.close;
                    dateMap[record.date][`Exchange_Disp`] = record.disp;
                    dateMap[record.date][`Exchange_State`] = record.state;
                    dateMap[record.date][`Exchange_Eval`] = record.eval;
                });
            }

            const dates = Object.keys(dateMap).sort();
            if (dates.length === 0) return alert("다운로드할 데이터가 없습니다.");

            let csvContent = "Date,환율 Price,환율 이격도,환율 상태,환율 평가,";
            const headers = [];
            stockResults.forEach(s => {
                headers.push(`${s.symbol} Price`, `${s.symbol} 이격도`, `${s.symbol} 상태`, `${s.symbol} 평가`);
            });
            csvContent += headers.join(",") + "\n";

            for (let i = dates.length - 1; i >= 0; i--) {
                const date = dates[i];
                const row = [date];
                const data = dateMap[date];

                row.push(data[`Exchange_Price`] !== undefined ? data[`Exchange_Price`].toFixed(2) : "");
                row.push(data[`Exchange_Disp`] !== undefined ? data[`Exchange_Disp`].toFixed(4) : "");
                row.push(data[`Exchange_State`] || "");
                row.push(data[`Exchange_Eval`] || "");

                stockResults.forEach(s => {
                    row.push(data[`${s.symbol}_Price`] !== undefined ? data[`${s.symbol}_Price`].toFixed(2) : "");
                    row.push(data[`${s.symbol}_Disp`] !== undefined ? data[`${s.symbol}_Disp`].toFixed(4) : "");
                    row.push(data[`${s.symbol}_State`] || "");
                    row.push(data[`${s.symbol}_Eval`] || "");
                });
                csvContent += row.join(",") + "\n";
            }

            const bom = "\uFEFF"; 
            const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Data_Check_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- 미니게임 (하락장 피하기 & 보스전) 로직 ---
        let gameLoopId;
        function startMiniGame() {
            const canvas = document.getElementById('gameCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let score = 0; // 이제 수익률(%)로 표기됩니다.
            let nextBossScore = 100; // 100단위마다 보스 등장
            let isGameOver = false;
            let frame = 0;
            let nextSpawnFrame = 50; 

            const player = { x: 30, y: 100, w: 20, h: 20, dy: 0, gravity: 0.6, jumpPow: -8.5, grounded: false, jumps: 0, maxJumps: 2 };
            let obstacles = [];

            // 보스 (거대 폭락장) 객체
            let boss = {
                active: false,
                x: 300, y: 30, w: 45, h: 50,
                speedY: 2, level: 1,
                fireCooldown: 0, fired: 0, maxFire: 0,
                state: 'entering' // entering, fighting, leaving
            };

            function updateScoreBoard() {
                const board = document.getElementById('scoreBoard');
                if (boss.active) {
                    board.innerHTML = `<span style="color:#ff5252;">⚠️ [Lv.${boss.level} 거대 하락장 등장!] ⚠️</span> | 수익률: +${score}%`;
                } else {
                    board.innerText = `터치/클릭 점프 (더블 점프!) | 수익률: +${score}%`;
                }
            }

            function jump(e) {
                if (e) e.preventDefault();
                
                if (isGameOver) {
                    obstacles = [];
                    score = 0;
                    nextBossScore = 100;
                    frame = 0;
                    nextSpawnFrame = 50;
                    isGameOver = false;
                    boss.active = false;
                    updateScoreBoard();
                } else if (player.jumps < player.maxJumps) {
                    player.dy = player.jumpPow;
                    player.grounded = false;
                    player.jumps++;
                }
            }

            canvas.addEventListener('mousedown', jump);
            canvas.addEventListener('touchstart', jump, {passive: false});

            function update() {
                if (isGameOver) return;
                
                player.dy += player.gravity;
                player.y += player.dy;
                
                if (player.y + player.h >= 130) {
                    player.y = 130 - player.h;
                    player.dy = 0;
                    player.grounded = true;
                    player.jumps = 0;
                }

                frame++;
                
                // 보스전 진입 판정 (수익률이 nextBossScore 이상 도달 시)
                if (score >= nextBossScore && !boss.active) {
                    // 화면에 남은 일반 장애물이 모두 사라지면 보스 등장
                    if (obstacles.length === 0) {
                        boss.active = true;
                        boss.x = 300;
                        boss.y = 40;
                        boss.level = Math.floor(score / 100);
                        boss.speedY = 1.5 + (boss.level * 0.5); // 레벨별 속도 상승
                        boss.fired = 0;
                        boss.maxFire = 5 + (boss.level * 3); // 레벨별 패턴 횟수 상승
                        boss.fireCooldown = 30;
                        boss.state = 'entering';
                        updateScoreBoard();
                    }
                }

                // 보스 행동 패턴
                if (boss.active) {
                    if (boss.state === 'entering') {
                        boss.x -= 2;
                        if (boss.x <= 230) boss.state = 'fighting';
                    } else if (boss.state === 'fighting') {
                        // 위아래 바운스 이동
                        boss.y += boss.speedY;
                        if (boss.y < 10 || boss.y + boss.h > 115) boss.speedY *= -1;

                        boss.fireCooldown--;
                        if (boss.fireCooldown <= 0 && boss.fired < boss.maxFire) {
                            // 보스가 쏘는 악재(Projectiles)
                            let pSpeed = 4 + boss.level + Math.random() * 2;
                            let pSize = 12 + Math.random() * 8;
                            
                            // 하단 공격 패턴 추가: 60% 확률로 바닥으로 굴러가고, 40%는 보스 높이에서 날아감
                            let projY = Math.random() < 0.6 ? 130 - pSize : boss.y + Math.random() * 20;

                            // passed:true 처리하여 보스의 투사체는 피할 때마다 점수가 오르지 않게 함
                            obstacles.push({ x: boss.x, y: projY, w: pSize, h: pSize, speed: pSpeed, color: '#e74c3c', passed: true, isBossProj: true });
                            boss.fired++;
                            boss.fireCooldown = Math.max(15, 50 - (boss.level * 5)); // 고레벨일수록 연사력 증가
                        }

                        // 패턴을 다 쏘고 투사체가 사라지면 퇴장
                        if (boss.fired >= boss.maxFire && obstacles.length === 0) {
                            boss.state = 'leaving';
                        }
                    } else if (boss.state === 'leaving') {
                        boss.x += 3;
                        if (boss.x > 300) {
                            boss.active = false;
                            score += 20; // 보스 처치 대량 보너스 수익률
                            nextBossScore = score - (score % 100) + 100; // 다음 100단위 목표 설정
                            updateScoreBoard();
                        }
                    }
                } 
                // 일반 장애물 생성 (보스전이 아닐 때만)
                else {
                    if (score < nextBossScore && frame >= nextSpawnFrame) {
                        let baseSpeed = 4 + (score / 200);
                        let obsType = Math.random();
                        let obsW, obsH, obsSpeed;
                        let color = '#448aff'; 

                        if (obsType < 0.2) {
                            obsW = 15; obsH = 15; obsSpeed = baseSpeed + 3; color = '#8e44ad'; // 급락장
                        } else if (obsType < 0.4) {
                            obsW = 40 + Math.random() * 20; obsH = 20; obsSpeed = baseSpeed - 1; // 장기 침체
                        } else if (obsType < 0.6) {
                            obsW = 20; obsH = 35 + Math.random() * 10; obsSpeed = baseSpeed; // 깊은 하락
                        } else {
                            obsW = 15 + Math.random() * 10; obsH = 15 + Math.random() * 10; obsSpeed = baseSpeed + (Math.random() * 2 - 1); // 일반
                        }

                        obstacles.push({ x: 300, y: 130 - obsH, w: obsW, h: obsH, speed: obsSpeed, color: color, passed: false });

                        let minDelay = Math.max(30, 70 - Math.floor(score/30)); 
                        let maxDelay = minDelay + 40 + Math.random() * 40;
                        nextSpawnFrame = frame + minDelay + Math.floor(Math.random() * (maxDelay - minDelay));
                    }
                }

                // 장애물 이동 및 충돌 판정
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    obs.x -= obs.speed;
                    
                    // 일반 장애물 회피 성공 시 수익률(+10%) 증가
                    if (!obs.passed && player.x > obs.x + obs.w) {
                        obs.passed = true;
                        score += 10;
                        updateScoreBoard();
                    }

                    if (obs.x + obs.w < 0) {
                        obstacles.splice(i, 1);
                    }
                    
                    if (player.x + 4 < obs.x + obs.w && player.x + player.w - 4 > obs.x &&
                        player.y + 4 < obs.y + obs.h && player.y + player.h - 4 > obs.y) {
                        isGameOver = true;
                    }
                }
            }

            function draw() {
                ctx.clearRect(0, 0, 300, 150);
                
                // 바닥 선
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 130, 300, 2);

                // 플레이어 (상승장/개미)
                ctx.fillStyle = '#ff5252';
                ctx.fillRect(player.x, player.y, player.w, player.h);
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x + 12, player.y + 4, 4, 4);

                // 보스 렌더링
                if (boss.active) {
                    ctx.fillStyle = '#000000'; // 검은색 폭락장 보스
                    ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                    // 보스의 화난 눈
                    ctx.fillStyle = '#ff5252';
                    ctx.fillRect(boss.x + 8, boss.y + 12, 10, 6);
                    ctx.fillRect(boss.x + 28, boss.y + 12, 10, 6);
                    // 보스의 입
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(boss.x + 12, boss.y + 35, 22, 4);
                    
                    // 레벨 텍스트
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`Lv.${boss.level}`, boss.x + boss.w/2, boss.y - 5);
                }

                // 장애물 렌더링
                for (let obs of obstacles) {
                    ctx.fillStyle = obs.color;
                    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                }

                if (isGameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, 300, 150);
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('마이너스 수익률! (게임오버)', 150, 70);
                    ctx.font = '12px sans-serif';
                    ctx.fillText('다시 하려면 터치하세요', 150, 95);
                }
            }

            function loop() {
                update();
                draw();
                gameLoopId = requestAnimationFrame(loop);
            }
            
            updateScoreBoard();
            loop();
        }

        function stopMiniGame() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
        }

        async function initApp() {
            startMiniGame();

            const exchangePrices = await fetchHistory('USDKRW=X');
            const exState = calculateExchangeState(exchangePrices);

            const stockResults = [];
            for (let s of STOCKS) {
                const prices = await fetchHistory(s.symbol);
                const state = calculateStockState(prices, s.buy, s.sell, s.symbol); 
                stockResults.push({ symbol: s.symbol, ...state });
            }

            function getEvalColor(evalText) {
                if (!evalText) return '#aaaaaa';
                if (evalText.includes('심한 저평가') || evalText === '저환율') return '#ff5252';
                if (evalText === '저평가') return '#ff8a65';
                if (evalText === '중립' || evalText === '적정') return '#9e9e9e';
                if (evalText === '과열') return '#64b5f6';
                if (evalText.includes('심한 과열') || evalText === '고환율') return '#448aff';
                return '#aaaaaa';
            }

            let exStatusText = exState.status;
            if (exStatusText.includes('적극 권장')) exStatusText = `<span class="buy">${exStatusText}</span>`;
            else if (exStatusText.includes('권장')) exStatusText = `<span class="highlight">${exStatusText}</span>`;
            else if (exStatusText.includes('장려') || exStatusText.includes('고려')) exStatusText = `<span style="color:#f39c12; font-weight:600;">${exStatusText}</span>`;
            else exStatusText = `<span class="wait">${exStatusText}</span>`;

            let html = `
            <div class="row">
                <div class="col-title">환전여부:</div>
                <div class="col-status">${exStatusText}</div>
                <div class="col-eval" style="color: ${getEvalColor(exState.evalState)}">${exState.evalState}</div>
                <div class="col-price">현재 환율: ${formatPrice(exState.currentPrice, true)}</div>
            </div>`;

            stockResults.forEach(r => {
                let statusText = r.state;
                if (r.state === '매수 (Buy)' || r.state === '초기 보유 시작') {
                    statusText = `<span class="buy">${r.state}</span>`;
                } else if (r.state === '매도 (Sell)') {
                    statusText = `<span class="sell">${r.state}</span>`;
                } else {
                    statusText = `<span class="wait">${r.state}</span>`;
                }

                html += `
                <div class="row">
                    <div class="col-title">${r.symbol}:</div>
                    <div class="col-status">${statusText}</div>
                    <div class="col-eval" style="color: ${getEvalColor(r.evalState)}">${r.evalState}</div>
                    <div class="col-price">현재가: ${formatPrice(r.currentPrice, false)}</div>
                </div>`;
            });

            stopMiniGame();

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').classList.remove('loading');

            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.style.display = 'block';
            downloadBtn.addEventListener('click', () => downloadCSV(stockResults, exState));
        }

        initApp();
    </script>
</body>
