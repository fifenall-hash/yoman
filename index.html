<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <!-- PWA 및 아이콘 설정 -->

    <link rel="icon" href="icon.ico" sizes="any">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* 다크 모드 배경 */

            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

            align-items: center;

        #app {
            width: 100%;
            max-width: 500px;
            padding: 20px;

        }
        header {
            text-align: center;

        }

            display: flex;
            align-items: center;
            padding: 16px 0;

        .row:last-child {

        }
        .col-title {
            flex: 0 0 60px;

            flex: 0 0 85px;

            flex: 0 0 110px;

        }
        /* 한국 주식 기준 색상: 매수(빨강), 매도(파랑) */
        .buy { color: #ff5252; font-weight: 700; }

        .wait { color: #9e9e9e; }
        
        .loading {
            text-align: center;
            color: #aaaaaa;
            margin-top: 50px;
        }

        /* CSV 다운로드 버튼 스타일 */
        .btn-download {
            display: none;
            width: 100%;
            padding: 12px;
            margin-top: 30px;
            background-color: #1e1e1e;
            color: #666;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-download:hover {
            background-color: #2a2a2a;
            color: #aaa;
        }

        /* 미니게임 스타일 */
        #game-container {
            position: relative; 
            width: 300px;
            margin: 20px auto 0 auto;
            text-align: center;
        }
        #gameCanvas {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            display: block;
            touch-action: none; 
            cursor: pointer;
        }
        #scoreBoard {
            margin-top: 10px;
            font-size: 13px;
            color: #ffd740;

        }

        /* 데이터 준비 완료 모달 스타일 */
        #dataReadyModal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 300px; height: 150px;

            align-items: center;

        }
        .modal-btn {
            font-family: inherit;
            font-size: 12px;
            margin-bottom: 8px;

            cursor: pointer;
            border: none;

            transition: background-color 0.2s, opacity 0.2s;

        .btn-cont { background: #3498db; color: white; }
        .btn-cont:hover { background: #2980b9; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-stop:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <h1>지금 사요?</h1>
        </header>
        <div id="content" class="loading">
            <div style="margin-bottom: 15px;">
                주식 및 환율 데이터를 분석 중입니다...<br><span style="font-size: 12px; color: #666;">(야후 파이낸스 접속 및 타점 탐색 중)</span><br><br>
                <span style="font-size: 13px; color: #ff5252; line-height: 1.4; display: inline-block;">
                    로딩 시간이 좀 걸립니다. 모바일 환경인 경우 화면이 꺼지면 연산이 멈추고 데이터가 나오지 않을 수 있으니 미니 게임을 하면서 기다려주세요.<br>pc환경은 브라우저를 켜 놓기만 하면 됩니다.
                </span>
            </div>
            
            <!-- 미니게임 영역 -->
            <div id="game-container">
                <canvas id="gameCanvas" width="300" height="150"></canvas>
                
                <!-- 데이터 준비 완료 선택창 -->
                <div id="dataReadyModal">
                    <p style="font-size: 13px; color: white; margin: 0 0 12px 0; text-align: center; line-height: 1.4;">
                        데이터 준비가 완료되었습니다.<br>게임을 계속 하시겠습니까?
                    </p>
                    <button id="btn-continue-game" class="modal-btn btn-cont">이번판만 하고 데이터 보러 가기.</button>
                    <button id="btn-show-data" class="modal-btn btn-stop">바로 데이터 보러 가기.</button>
                </div>
                
                <div id="scoreBoard">터치/클릭 점프 (더블 점프!) | 수익률: +0%</div>
            </div>
        </div>
        
        <button id="downloadBtn" class="btn-download">📊 데이터 확인용 CSV 다운로드</button>
    </div>

    <script>
        // PWA 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.error("SW 등록 실패:", err));
        }

        // 종목 배열에 SPXL 추가
        const STOCKS = ['SPXL', 'TQQQ', 'TECL', 'SOXL'];

        function formatPrice(price, isKrw = false) {
            if (!price) return '데이터 없음';
            if (isKrw) {
                return Math.round(price).toLocaleString('ko-KR') + '원';
            } else {
                return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
        }

        // Yahoo Finance 데이터 패치
        async function fetchHistory(ticker) {
            const currentUnixTime = Math.floor(Date.now() / 1000); 
            const targetUrl1 = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=0&period2=${currentUnixTime}&interval=1d&events=history`;
            const targetUrl2 = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?period1=0&period2=${currentUnixTime}&interval=1d&events=history`;

            const proxyList = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl1)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl1)}`,
                `https://corsproxy.io/?${encodeURIComponent(targetUrl1)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl2)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl2)}`,
                `https://thingproxy.freeboard.io/fetch/${targetUrl1}`
            ];

            let history = [];
            for (let proxy of proxyList) {
                try {
                    const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                    if (response.ok) {
                        const textData = await response.text();
                        let data;
                        try { data = JSON.parse(textData); } catch (e) { continue; }

                        if (data && data.chart && data.chart.result) { 
                            const result = data.chart.result[0];
                            const timestamps = result.timestamp;
                            const quotes = result.indicators.quote[0];
                            const adjcloses = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : null;

                            if (timestamps && timestamps.length > 0) {
                                for (let i = 0; i < timestamps.length; i++) {
                                    let p = adjcloses ? adjcloses[i] : quotes.close[i];
                                    if (!p || p <= 0 || !Number.isFinite(p)) continue;

                                    const dateObj = new Date(timestamps[i] * 1000);
                                    const yyyy = dateObj.getUTCFullYear();
                                    const mm = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
                                    const dd = String(dateObj.getUTCDate()).padStart(2, '0');

                                    history.push({ date: `${yyyy}-${mm}-${dd}`, close: p });
                                }
                            }
                            if (history.length > 0) break; 
                        }
                    }
                } catch (error) { console.warn(`Proxy fail:`, proxy, error); }
            }
            return history;
        }

        // 정규분포 CDF 역함수 (분위수 타점 도출용)
        function inverseNormalCDF(p) {
            if (p <= 0.0) return -Infinity;
            if (p >= 1.0) return Infinity;
            let t, z;
            if (p < 0.5) {
                t = Math.sqrt(-2.0 * Math.log(p));
            } else {
                t = Math.sqrt(-2.0 * Math.log(1.0 - p));
            }
            let c0 = 2.515517, c1 = 0.802853, c2 = 0.010328;
            let d1 = 1.432788, d2 = 0.189269, d3 = 0.001308;
            z = t - ((c2 * t + c1) * t + c0) / (((d3 * t + d2) * t + d1) * t + 1.0);
            return p < 0.5 ? -z : z;
        }

        // 범용 최적화 타점 계산 (안전 반경 최대화 지점 찾기)
        function findOptimalTradePoints(dates, prices, period) {
            const N = prices.length;
            let disparities = new Array(N).fill(null);
            let sum = 0, minD = 9999, maxD = -9999;
            let validDisparities = [];

            for (let i = 0; i < N; i++) {
                let p = prices[i];
                sum += p;
                if (i >= period) sum -= prices[i - period];
                if (i >= period - 1) {
                    let avg = sum / period;
                    if (avg > 0) {
                        let d = p / avg;
                        disparities[i] = d;
                        if (Number.isFinite(d)) {
                            validDisparities.push(d);
                            if (d < minD) minD = d;
                            if (d > maxD) maxD = d;
                        }
                    }
                }
            }

            if (validDisparities.length < 10) return { buyPt: 0.9, sellPt: 1.1, disparities };

            let firstValidIdx = disparities.findIndex(d => d !== null);
            const startDt = new Date(dates[firstValidIdx]);
            const endDt = new Date(dates[N - 1]);
            let totalYears = Math.ceil(Math.abs(endDt - startDt) / (1000 * 60 * 60 * 24)) / 365.2425;
            if (totalYears <= 0) totalYears = 0.001;

            const baseInitialPrice = prices[firstValidIdx];
            const baseLatestPrice = prices[N - 1];
            const baseCagr = (Math.pow(baseLatestPrice / baseInitialPrice, 1 / totalYears) - 1) * 100;
            const initCap = 10000;

            let step = 0.05; 
            let startD = Math.floor(minD / step) * step - step;
            let endD = Math.ceil(maxD / step) * step + step;
            let xLabels = [], yLabels = []; 
            for (let b = startD; b <= endD + 0.001; b += step) xLabels.push(parseFloat(b.toFixed(2)));
            for (let s = startD; s <= endD + 0.001; s += step) yLabels.push(parseFloat(s.toFixed(2)));

            let badPoints = []; 
            for (let i = 0; i < yLabels.length; i++) {
                let sellPt = yLabels[i];
                for (let j = 0; j < xLabels.length; j++) {
                    let buyPt = xLabels[j];
                    if (buyPt >= sellPt) {
                        badPoints.push({ buy: buyPt, sell: sellPt });
                        continue; 
                    }
                    let cash = 0, shares = initCap / baseInitialPrice, isHolding = true;
                    for (let k = firstValidIdx; k < N; k++) {
                        let d = disparities[k];
                        if (d === null) continue;
                        let p = prices[k];
                        if (isHolding && d > sellPt && shares > 0) { cash = shares * p; shares = 0; isHolding = false; } 
                        else if (!isHolding && d < buyPt && cash > 0) { shares = cash / p; cash = 0; isHolding = true; }
                    }
                    let finalCap = cash + (shares * baseLatestPrice);
                    let strategyCagr = (Math.pow(finalCap / initCap, 1 / totalYears) - 1) * 100;
                    let utility = (((1 + strategyCagr / 100) / (1 + baseCagr / 100)) - 1) * 100;
                    
                    if (utility <= 0) badPoints.push({ buy: buyPt, sell: sellPt });
                }
            }

            let dispSum = 0;
            for(let d of validDisparities) dispSum += d;
            let mean = dispSum / validDisparities.length;
            let sqSum = 0;
            for(let d of validDisparities) sqSum += Math.pow(d - mean, 2);
            let stdDev = Math.sqrt(sqSum / validDisparities.length);

            let bestRadius = -Infinity;
            let bestBuy = 0.9, bestSell = 1.1;

            // 분위수 대칭 탐색 (1% ~ 50%)
            for (let p_percent = 1.0; p_percent <= 50.0; p_percent += 0.5) {
                let p_buy = p_percent / 100;
                let p_sell = (100 - p_percent) / 100;

                let z_buy = inverseNormalCDF(p_buy);
                let z_sell = inverseNormalCDF(p_sell);

                let buyPt = mean + z_buy * stdDev;
                let sellPt = mean + z_sell * stdDev;

                let minSq = Infinity;
                if (badPoints.length === 0) {
                    minSq = 100.0; 
                } else {
                    for (let b of badPoints) {
                        let dSq = Math.pow(sellPt - b.sell, 2) + Math.pow(buyPt - b.buy, 2);
                        if (dSq < minSq) minSq = dSq;
                    }
                }
                let safeR = Math.sqrt(minSq);

                if (safeR > bestRadius) {
                    bestRadius = safeR;
                    bestBuy = buyPt;
                    bestSell = sellPt;
                }
            }

            return { buyPt: bestBuy, sellPt: bestSell, disparities };
        }

        // 이격도 기반 구역 분할 함수
        function determineZone(disp, buyPt, sellPt) {
            if (disp === null || !Number.isFinite(disp)) return null;
            let diff = sellPt - buyPt;
            let semiSellPt = sellPt - diff / 3;
            let semiBuyPt = buyPt + diff / 3;

            if (disp >= sellPt) return 'a';
            if (disp >= semiSellPt) return 'b';
            if (disp > semiBuyPt) return 'c';
            if (disp >= buyPt) return 'd';
            return 'e';
        }

        // 구역에 따른 텍스트 컬러 (요청에 따른 RGB)
        function getZoneColor(zone) {
            if (zone === 'a') return 'rgb(0, 0, 255)';
            if (zone === 'b') return 'rgb(0, 128, 255)';
            if (zone === 'c') return 'rgb(128, 128, 128)';
            if (zone === 'd') return 'rgb(255, 128, 0)';
            if (zone === 'e') return 'rgb(255, 0, 0)';
            return '#aaaaaa';
        }

        // 주식 데이터 처리
        function processStock(historyData, symbol) {
            const period = 1500;
            if (historyData.length < period) return { symbol, state: '데이터 부족', historyLog: [] };
            
            let dates = historyData.map(h => h.date);
            let prices = historyData.map(h => h.close);

            let { buyPt, sellPt, disparities } = findOptimalTradePoints(dates, prices, period);
            
            let historyLog = [];
            let isHolding = true; 
            let lastActionDateObj = new Date(dates[period - 1]);
            let lastActionType = "매수";
            let currentStateStr = "초기 보유 시작";

            for (let i = period - 1; i < dates.length; i++) {
                let d = disparities[i];
                let actionOccurred = false;

                if (i === period - 1) {
                    actionOccurred = true;
                    currentStateStr = "초기 보유 시작";
                    lastActionDateObj = new Date(dates[i]);
                } else {
                    if (isHolding && d >= sellPt) {
                        isHolding = false;
                        lastActionType = "매도";
                        lastActionDateObj = new Date(dates[i]);
                        currentStateStr = "매도 (Sell)";
                        actionOccurred = true;
                    } else if (!isHolding && d <= buyPt) {
                        isHolding = true;
                        lastActionType = "매수";
                        lastActionDateObj = new Date(dates[i]);
                        currentStateStr = "매수 (Buy)";
                        actionOccurred = true;
                    }
                }

                if (!actionOccurred) {
                    const currentDt = new Date(dates[i]);
                    const diffTime = Math.abs(currentDt - lastActionDateObj);
                    const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                    if (diffDays >= 365) currentStateStr = `${lastActionType} 후 관망 (${(diffDays / 365.2425).toFixed(2)}년차)`;
                    else currentStateStr = `${lastActionType} 후 관망 (${diffDays}일차)`;
                }

                let zone = determineZone(d, buyPt, sellPt);
                let evalState = '적정';
                if (zone === 'a') evalState = '심한 과열';
                else if (zone === 'b') evalState = '과열';
                else if (zone === 'c') evalState = '적정';
                else if (zone === 'd') evalState = '저평가';
                else if (zone === 'e') evalState = '심한 저평가';

                historyLog.push({ date: dates[i], close: prices[i], disp: d, action: currentStateStr, eval: evalState, zone: zone });
            }

            const lastLog = historyLog[historyLog.length - 1];
            return { symbol, state: lastLog.action, evalState: lastLog.eval, currentPrice: lastLog.close, zone: lastLog.zone, historyLog };
        }

        // 환율 최적 기준일수 도출 로직
        function getFastR2ForPeriod(prices, rawMulrimData, maxMulrim, period) {
            const N = prices.length;
            let validX = [], validY = [], sum = 0;
            for (let i = 0; i < N; i++) {
                sum += prices[i];
                if (i >= period) sum -= prices[i - period];
                if (i >= period - 1) {
                    let avg = sum / period;
                    if (avg > 0) {
                        let disparity = prices[i] / avg;
                        if ((N - 1) - i >= maxMulrim && Number.isFinite(disparity)) {
                            validX.push(disparity); validY.push(rawMulrimData[i]);
                        }
                    }
                }
            }
            if (validX.length < 30) return 0;
            let sumX = 0, sumY = 0;
            for (let i = 0; i < validX.length; i++) { sumX += validX[i]; sumY += validY[i]; }
            let meanX = sumX / validX.length, meanY = sumY / validY.length;
            let covXY = 0, varX = 0, varY = 0;
            for (let i = 0; i < validX.length; i++) {
                let dx = validX[i] - meanX, dy = validY[i] - meanY;
                covXY += dx * dy; varX += dx * dx; varY += dy * dy;
            }
            if (varX > 0 && varY > 0) return (covXY / Math.sqrt(varX * varY)) ** 2;
            return 0;
        }

        // 환율 데이터 처리
        function processExchange(historyData) {
            const dates = historyData.map(h => h.date);
            const prices = historyData.map(h => h.close);
            const N = prices.length;
            if (N < 100) return { status: '데이터 부족', historyLog: [] };

            let rawMulrimData = new Array(N).fill(0);
            let maxMulrim = 0;
            for (let i = 0; i < N; i++) {
                let count = 0;
                let currentPrice = prices[i];
                for (let j = i + 1; j < N; j++) { if (prices[j] < currentPrice) count++; }
                rawMulrimData[i] = count;
                if (count > maxMulrim) maxMulrim = count;
            }

            const maxTestPeriod = Math.min(3000, N - maxMulrim - 30);
            let bestPeriod = 20; 
            let bestR2 = -1;
            if (maxTestPeriod >= 1) {
                for (let p = 1; p <= maxTestPeriod; p++) {
                    let r2 = getFastR2ForPeriod(prices, rawMulrimData, maxMulrim, p);
                    if (r2 > bestR2) { bestR2 = r2; bestPeriod = p; }
                }
            }

            let { buyPt, sellPt, disparities } = findOptimalTradePoints(dates, prices, bestPeriod);

            const historyLog = [];
            for (let i = bestPeriod - 1; i < N; i++) {
                let d = disparities[i];
                let zone = determineZone(d, buyPt, sellPt);
                
                let actionState = '관망';
                let evalState = '적정';

                if (zone === 'a') { actionState = '관망'; evalState = '심한 고환율'; }
                else if (zone === 'b') { actionState = '달러 환전 고려'; evalState = '고환율'; }
                else if (zone === 'c') { actionState = '달러 환전 장려'; evalState = '적정'; }
                else if (zone === 'd') { actionState = '달러 환전 권장'; evalState = '저환율'; }
                else if (zone === 'e') { actionState = '달러 환전 적극 권장!'; evalState = '심한 저환율'; }

                historyLog.push({ date: dates[i], close: prices[i], disp: d, action: actionState, eval: evalState, zone: zone });
            }

            const lastLog = historyLog[historyLog.length - 1];
            return { status: lastLog.action, evalState: lastLog.eval, currentPrice: lastLog.close, zone: lastLog.zone, historyLog };
        }

        // CSV 다운로드 함수
        function downloadCSV(stockResults, exState) {
            const dateMap = {};
            
            stockResults.forEach(stock => {
                if (!stock.historyLog) return;
                stock.historyLog.forEach(record => {
                    if (!dateMap[record.date]) dateMap[record.date] = { date: record.date };
                    dateMap[record.date][`${stock.symbol}_Price`] = record.close;
                    dateMap[record.date][`${stock.symbol}_Disp`] = record.disp;
                    dateMap[record.date][`${stock.symbol}_State`] = record.action;
                    dateMap[record.date][`${stock.symbol}_Eval`] = record.eval;
                });
            });

            if (exState && exState.historyLog) {
                exState.historyLog.forEach(record => {
                    if (!dateMap[record.date]) dateMap[record.date] = { date: record.date };
                    dateMap[record.date][`Exchange_Price`] = record.close;
                    dateMap[record.date][`Exchange_Disp`] = record.disp;
                    dateMap[record.date][`Exchange_State`] = record.action;
                    dateMap[record.date][`Exchange_Eval`] = record.eval;
                });
            }

            const dates = Object.keys(dateMap).sort();
            if (dates.length === 0) return alert("다운로드할 데이터가 없습니다.");

            let csvContent = "Date,환율 Price,환율 이격도,환율 행동,환율 평가,";
            const headers = [];
            stockResults.forEach(s => { headers.push(`${s.symbol} Price`, `${s.symbol} 이격도`, `${s.symbol} 행동`, `${s.symbol} 평가`); });
            csvContent += headers.join(",") + "\n";

            for (let i = dates.length - 1; i >= 0; i--) {
                const date = dates[i];
                const row = [date];
                const data = dateMap[date];

                row.push(data[`Exchange_Price`] !== undefined ? data[`Exchange_Price`].toFixed(2) : "");
                row.push(data[`Exchange_Disp`] !== undefined ? data[`Exchange_Disp`].toFixed(4) : "");
                row.push(data[`Exchange_State`] || "");
                row.push(data[`Exchange_Eval`] || "");

                stockResults.forEach(s => {
                    row.push(data[`${s.symbol}_Price`] !== undefined ? data[`${s.symbol}_Price`].toFixed(2) : "");
                    row.push(data[`${s.symbol}_Disp`] !== undefined ? data[`${s.symbol}_Disp`].toFixed(4) : "");
                    row.push(data[`${s.symbol}_State`] || "");
                    row.push(data[`${s.symbol}_Eval`] || "");
                });
                csvContent += row.join(",") + "\n";
            }

            const bom = "\uFEFF"; 
            const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Data_Check_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- 오디오 (효과음) 합성 ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(freqStart, freqEnd, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
                if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
                
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { console.error("Audio error:", e); }
        }

        function playJump() { initAudio(); playSound(320, 600, 'triangle', 0.15, 0.15); } 
        function playHit() { initAudio(); playSound(150, 40, 'sawtooth', 0.4, 0.2); }
        function playBoss() { 
            initAudio(); 
            playSound(200, 100, 'square', 0.8, 0.15); 
            setTimeout(() => playSound(250, 120, 'square', 0.8, 0.15), 200); 
        }
        function playClear() {
            initAudio();
            setTimeout(() => playSound(523, 523, 'triangle', 0.15, 0.15), 0);
            setTimeout(() => playSound(659, 659, 'triangle', 0.15, 0.15), 150);
            setTimeout(() => playSound(783, 783, 'triangle', 0.15, 0.15), 300);
            setTimeout(() => playSound(1046, 1046, 'triangle', 0.4, 0.2), 450);
        }

        // --- 미니게임 (보스 4단계 진화 및 음봉 몹 패턴) 로직 ---
        let gameLoopId;
        let finalDataPayload = null; 
        let isWaitingForDataChoice = false; 
        let continueGameAfterData = false; 
        let canClickModal = false; 

        function triggerDataReady(renderCallback) {
            finalDataPayload = renderCallback;
            if (isGameOver || isGameClear) {
                finishGameAndShowData();
            } else {
                isWaitingForDataChoice = true;
                const modal = document.getElementById('dataReadyModal');
                const btns = document.querySelectorAll('.modal-btn');
                
                modal.style.display = 'flex';
                canClickModal = false; 
                
                btns.forEach(b => {
                    b.style.opacity = '0.4';
                    b.style.cursor = 'not-allowed';
                });

                // 0.5초 방어 쿨타임
                setTimeout(() => {
                    canClickModal = true;
                    btns.forEach(b => {
                        b.style.opacity = '1';
                        b.style.cursor = 'pointer';
                    });
                }, 500);
            }
        }

        function finishGameAndShowData() {
            stopMiniGame();
            if (finalDataPayload) finalDataPayload();
        }

        document.getElementById('btn-continue-game').addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (!canClickModal) return; 
            isWaitingForDataChoice = false;
            continueGameAfterData = true; 
            document.getElementById('dataReadyModal').style.display = 'none';
        });

        document.getElementById('btn-show-data').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!canClickModal) return;
            isWaitingForDataChoice = false;
            document.getElementById('dataReadyModal').style.display = 'none';
            finishGameAndShowData();
        });

        let score = 0; 
        let nextBossScore = 100; 
        let isGameOver = false;
        let isGameClear = false;
        let frame = 0;
        let nextSpawnFrame = 50; 
        let obstacles = [];

        const player = { x: 30, y: 100, w: 20, h: 20, dy: 0, gravity: 0.6, jumpPow: -8.5, grounded: false, jumps: 0, maxJumps: 2 };
        let boss = { active: false, x: 300, y: 30, w: 40, h: 70, speedY: 2, level: 1, fireCooldown: 0, fired: 0, maxFire: 0, state: 'entering' };

        function updateScoreBoard() {
            const board = document.getElementById('scoreBoard');
            if (boss.active) {
                board.innerHTML = `<span style="color:#ff5252;">⚠️ [Lv.${boss.level} 거대 하락장 등장!] ⚠️</span> | 수익률: +${score}%`;
            } else {
                board.innerText = `터치/클릭 점프 (더블 점프!) | 수익률: +${score}%`;
            }
        }

        function startMiniGame() {
            const canvas = document.getElementById('gameCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            function jump(e) {
                if (e) e.preventDefault();
                initAudio(); 
                
                if (isWaitingForDataChoice) return; 

                if (isGameOver || isGameClear) {
                    if (continueGameAfterData && finalDataPayload) {
                        finishGameAndShowData();
                        return;
                    }
                    obstacles = [];
                    score = 0;
                    nextBossScore = 100;
                    frame = 0;
                    nextSpawnFrame = 50;
                    isGameOver = false;
                    isGameClear = false;
                    boss.active = false;
                    updateScoreBoard();
                } else if (player.jumps < player.maxJumps) {
                    player.dy = player.jumpPow;
                    player.grounded = false;
                    player.jumps++;
                    playJump(); 
                }
            }

            canvas.addEventListener('mousedown', jump);
            canvas.addEventListener('touchstart', jump, {passive: false});

            function update() {
                if (isGameOver || isGameClear || isWaitingForDataChoice) return; 
                
                player.dy += player.gravity;
                player.y += player.dy;
                
                if (player.y + player.h >= 130) {
                    player.y = 130 - player.h;
                    player.dy = 0;
                    player.grounded = true;
                    player.jumps = 0;
                }

                frame++;
                
                // 보스전 진입
                if (score >= nextBossScore && !boss.active) {
                    if (obstacles.length === 0) {
                        boss.active = true;
                        boss.x = 300;
                        boss.y = 40;
                        boss.level = Math.min(4, Math.floor(score / 100));
                        boss.w = 40;
                        
                        if (boss.level === 4) {
                            boss.h = 90; // 가장 큼
                            boss.speedY = 4.5; // 속도 극대화
                            boss.maxFire = 30; // 지속시간 2배 이상
                        } else {
                            boss.h = 70;
                            boss.speedY = 1.5 + (boss.level * 0.5); 
                            boss.maxFire = 5 + (boss.level * 3); 
                        }
                        
                        boss.fired = 0;
                        boss.fireCooldown = 30;
                        boss.state = 'entering';
                        playBoss();
                        updateScoreBoard();
                    }
                }

                if (boss.active) {
                    if (boss.state === 'entering') {
                        boss.x -= 2;
                        if (boss.x <= 230) boss.state = 'fighting';
                    } else if (boss.state === 'fighting') {
                        boss.y += boss.speedY;
                        // 보스가 위아래로 튕길 때 화면 벗어나지 않게 처리
                        if (boss.y < 10 || boss.y + boss.h > 125) boss.speedY *= -1;

                        boss.fireCooldown--;
                        if (boss.fireCooldown <= 0 && boss.fired < boss.maxFire) {
                            let pSpeed = 4 + boss.level + Math.random() * 2;
                            if (boss.level === 4) pSpeed += 4; // 4단계 미사일 속도 대폭 증가
                            
                            let pWidth = 14; 
                            let pHeight = 14; 
                            let cType = 3; // 보스 미사일은 기본적으로 장대음봉
                            
                            // 장대 미사일 확률 적용
                            let longProb = boss.level === 4 ? 0.7 : 0.3;
                            if (Math.random() < longProb) {
                                pHeight += 15 + Math.random() * 15;
                                if (boss.level === 4) pHeight += 10; 
                            }
                            
                            let projY = Math.random() < 0.6 ? 130 - pHeight : boss.y + Math.random() * 20;

                            obstacles.push({ x: boss.x, y: projY, w: pWidth, h: pHeight, speed: pSpeed, color: '#448aff', passed: true, isBossProj: true, candleType: 3 });
                            boss.fired++;
                            
                            if (boss.level === 4) {
                                boss.fireCooldown = Math.max(12, 25 - Math.random() * 5); 
                            } else {
                                boss.fireCooldown = Math.max(15, 50 - (boss.level * 5)); 
                            }
                        }

                        if (boss.fired >= boss.maxFire && obstacles.length === 0) {
                            boss.state = 'leaving';
                        }
                    } else if (boss.state === 'leaving') {
                        boss.x += 3;
                        if (boss.x > 300) {
                            boss.active = false;
                            score += 20; 
                            
                            // 4단계 보스를 격파하면 게임 클리어 처리
                            if (boss.level === 4) {
                                isGameClear = true;
                                playClear();
                            } else {
                                nextBossScore = score - (score % 100) + 100; 
                                updateScoreBoard();
                            }
                        }
                    }
                } 
                else {
                    if (score < nextBossScore && frame >= nextSpawnFrame) {
                        let baseSpeed = 4 + (score / 200);
                        let obsW = 14; // 가로 크기 고정 (세로 캔들형태 유지)
                        let obsH = 25 + Math.random() * 20; 
                        let obsSpeed = baseSpeed + (Math.random() * 2 - 1);
                        let cType = Math.floor(Math.random() * 4); // 0:아래꼬리, 1:십자, 2:위꼬리, 3:장대
                        let color = '#448aff'; 

                        if (Math.random() < 0.2) {
                            obsSpeed += 3; color = '#0d47a1'; 
                        }

                        obstacles.push({ x: 300, y: 130 - obsH, w: obsW, h: obsH, speed: obsSpeed, color: color, passed: false, candleType: cType });

                        let minDelay = Math.max(30, 70 - Math.floor(score/30)); 
                        let maxDelay = minDelay + 40 + Math.random() * 40;
                        nextSpawnFrame = frame + minDelay + Math.floor(Math.random() * (maxDelay - minDelay));
                    }
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    obs.x -= obs.speed;
                    
                    if (!obs.passed && player.x > obs.x + obs.w) {
                        obs.passed = true;
                        score += 10;
                        updateScoreBoard();
                    }

                    if (obs.x + obs.w < 0) {
                        obstacles.splice(i, 1);
                    }
                    
                    if (player.x + 4 < obs.x + obs.w && player.x + player.w - 4 > obs.x &&
                        player.y + 4 < obs.y + obs.h && player.y + player.h - 4 > obs.y) {
                        if (!isGameOver) playHit();
                        isGameOver = true;
                    }
                }
            }

            function draw() {
                ctx.clearRect(0, 0, 300, 150);
                
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 130, 300, 2);

                ctx.fillStyle = '#ff5252';
                ctx.fillRect(player.x, player.y, player.w, player.h);
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x + 12, player.y + 4, 4, 4);

                if (boss.active) {
                    ctx.fillStyle = '#1565c0'; 
                    
                    let bodyY, bodyH, tailTopY = 0, tailTopH = 0, tailBotY = 0, tailBotH = 0, faceY;
                    let tw = 6;
                    let tx = boss.x + boss.w/2 - tw/2;
                    
                    // 보스 레벨별 외형 (캔들 형태)
                    if (boss.level === 1) { 
                        // Lv.1: 아래 꼬리 음봉
                        bodyY = boss.y; bodyH = 40;
                        tailBotY = boss.y + 40; tailBotH = boss.h - 40;
                        faceY = boss.y + 10;
                    } else if (boss.level === 2) { 
                        // Lv.2: 십자/위아래 꼬리
                        bodyY = boss.y + 20; bodyH = 30;
                        tailTopY = boss.y; tailTopH = 20;
                        tailBotY = boss.y + 50; tailBotH = boss.h - 50;
                        faceY = boss.y + 25;
                    } else if (boss.level === 3) { 
                        // Lv.3: 위 꼬리 음봉
                        bodyY = boss.y + 30; bodyH = boss.h - 30;
                        tailTopY = boss.y; tailTopH = 30;
                        faceY = boss.y + 35;
                    } else { 
                        // Lv.4: 장대 음봉 (꼬리 없음)
                        bodyY = boss.y; bodyH = boss.h;
                        faceY = boss.y + 30;
                    }
                    
                    if (tailTopH > 0) ctx.fillRect(tx, tailTopY, tw, tailTopH);
                    if (tailBotH > 0) ctx.fillRect(tx, tailBotY, tw, tailBotH);
                    
                    ctx.fillRect(boss.x, bodyY, boss.w, bodyH);
                    
                    // 화난 얼굴 표정
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(boss.x + 8, faceY, 10, 6);
                    ctx.fillRect(boss.x + 22, faceY, 10, 6);
                    ctx.fillStyle = '#ff0000'; 
                    ctx.fillRect(boss.x + 10, faceY + 2, 4, 4);
                    ctx.fillRect(boss.x + 24, faceY + 2, 4, 4);

                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(boss.x + 6, faceY - 5);
                    ctx.lineTo(boss.x + 18, faceY);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(boss.x + 34, faceY - 5);
                    ctx.lineTo(boss.x + 22, faceY);
                    ctx.stroke();

                    ctx.fillStyle = '#000000';
                    ctx.fillRect(boss.x + 12, faceY + 20, 16, 6);
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`Lv.${boss.level}`, boss.x + boss.w/2, bodyY - 5 < boss.y ? bodyY + bodyH + 12 : bodyY - 5);
                }

                for (let obs of obstacles) {
                    ctx.fillStyle = obs.color;
                    
                    let bw = obs.w;
                    let bh, by, tty=0, tth=0, tby=0, tbh=0;
                    let tw = 4;
                    let tx = obs.x + bw/2 - tw/2;

                    if (obs.candleType === 0) { // 아래꼬리
                        bh = obs.h * 0.4; by = obs.y;
                        tby = obs.y + bh; tbh = obs.h * 0.6;
                    } else if (obs.candleType === 1) { // 십자형
                        bh = obs.h * 0.3; by = obs.y + obs.h * 0.35;
                        tty = obs.y; tth = obs.h * 0.35;
                        tby = obs.y + obs.h * 0.65; tbh = obs.h * 0.35;
                    } else if (obs.candleType === 2) { // 위꼬리
                        bh = obs.h * 0.4; by = obs.y + obs.h * 0.6;
                        tty = obs.y; tth = obs.h * 0.6;
                    } else { // 장대음봉
                        bh = obs.h; by = obs.y;
                    }

                    ctx.fillRect(obs.x, by, bw, bh); 
                    if (tth > 0) ctx.fillRect(tx, tty, tw, tth); 
                    if (tbh > 0) ctx.fillRect(tx, tby, tw, tbh); 
                }

                if (isGameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, 300, 150);
                    ctx.fillStyle = '#fff';
                    
                    ctx.font = 'bold 22px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over', 150, 60);

                    ctx.font = '14px sans-serif';
                    ctx.fillText('고점에서 물렸습니다!', 150, 85);
                    
                    ctx.font = '12px sans-serif';
                    ctx.fillStyle = '#aaaaaa';
                    if (continueGameAfterData && finalDataPayload) {
                        ctx.fillText('터치하여 데이터 결과 보기', 150, 110);
                    } else {
                        ctx.fillText('다시 하려면 터치하세요', 150, 110);
                    }
                } else if (isGameClear) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, 300, 150);
                    
                    ctx.fillStyle = '#ffd740'; 
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Clear!', 150, 60);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = '14px sans-serif';
                    ctx.fillText('모든 하락장을 견뎌냈습니다!', 150, 85);
                    
                    ctx.font = '12px sans-serif';
                    ctx.fillStyle = '#aaaaaa';
                    if (continueGameAfterData && finalDataPayload) {
                        ctx.fillText('터치하여 데이터 결과 보기', 150, 110);
                    } else {
                        ctx.fillText('새 게임을 하려면 터치하세요', 150, 110);
                    }
                }
            }

            function loop() {
                update();
                draw();
                gameLoopId = requestAnimationFrame(loop);
            }
            
            updateScoreBoard();
            loop();
        }

        function stopMiniGame() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
        }

        async function initApp() {
            startMiniGame();

            const exchangePrices = await fetchHistory('USDKRW=X');
            const exState = processExchange(exchangePrices);

            const stockResults = [];
            for (let s of STOCKS) {
                const prices = await fetchHistory(s);
                stockResults.push(processStock(prices, s));
            }

            let html = `
            <div class="row">
                <div class="col-title">환전여부:</div>
                <div class="col-status" style="color: ${getZoneColor(exState.zone)}; font-weight:700;">${exState.status}</div>
                <div class="col-eval" style="color: ${getZoneColor(exState.zone)}; font-weight:700;">${exState.evalState}</div>
                <div class="col-price">현재 환율: ${formatPrice(exState.currentPrice, true)}</div>
            </div>`;

            stockResults.forEach(r => {
                let statusText = r.state;
                if (r.state.includes('매수 (Buy)') || r.state.includes('초기 보유 시작')) {
                    statusText = `<span class="buy">${r.state}</span>`;
                } else if (r.state.includes('매도 (Sell)')) {
                    statusText = `<span class="sell">${r.state}</span>`;
                } else {
                    statusText = `<span class="wait">${r.state}</span>`;
                }

                html += `
                <div class="row">
                    <div class="col-title">${r.symbol}:</div>
                    <div class="col-status">${statusText}</div>
                    <div class="col-eval" style="color: ${getZoneColor(r.zone)}; font-weight:700;">${r.evalState}</div>
                    <div class="col-price">현재가: ${formatPrice(r.currentPrice, false)}</div>
                </div>`;
            });

            triggerDataReady(() => {
                document.getElementById('content').innerHTML = html;
                document.getElementById('content').classList.remove('loading');

                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.style.display = 'block';
                downloadBtn.addEventListener('click', () => downloadCSV(stockResults, exState));
            });
        }

        initApp();
    </script>
