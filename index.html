<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지금 사요?</title>
    <!-- PWA 및 아이콘 설정 -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.ico" sizes="any">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#121212">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* 다크 모드 배경 */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            color: #ffffff;
        }
        .row {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #333;
            font-size: 15px;
        }
        .row:last-child {
            border-bottom: none;
        }
        .col-title {
            flex: 0 0 75px;
            font-weight: 600;
            color: #aaaaaa;
            text-align: left;
        }
        .col-status {
            flex: 1;
            padding-left: 10px;
            font-weight: 500;
        }
        .col-price {
            flex: 0 0 145px;
            text-align: right;
            color: #dddddd;
            font-variant-numeric: tabular-nums;
        }
        /* 한국 주식 기준 색상: 매수(빨강), 매도(파랑) */
        .buy { color: #ff5252; font-weight: 700; }
        .sell { color: #448aff; font-weight: 700; }
        .highlight { color: #ffd740; font-weight: 700; }
        .wait { color: #9e9e9e; }
        
        .loading {
            text-align: center;
            color: #aaaaaa;
            margin-top: 50px;
        }

        /* CSV 다운로드 버튼 스타일 */
        .btn-download {
            display: none;
            width: 100%;
            padding: 12px;
            margin-top: 30px;
            background-color: #1e1e1e;
            color: #666;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-download:hover {
            background-color: #2a2a2a;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <h1>지금 사요?</h1>
        </header>
        <div id="content" class="loading">주식 및 환율 데이터를 분석 중입니다...<br><span style="font-size: 12px; color: #666;">(야후 파이낸스 접속 중)</span></div>
        
        <button id="downloadBtn" class="btn-download">📊 데이터 확인용 CSV 다운로드</button>
    </div>

    <script>
        // PWA 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.error("SW 등록 실패:", err));
        }

        // 종목 및 매수(이하)/매도(이상) 이격 비율 고정값
        const STOCKS = [
            { symbol: 'TQQQ', buy: 1.5, sell: 3.0 },
            { symbol: 'TECL', buy: 1.5, sell: 3.5 },
            { symbol: 'SOXL', buy: 1.0, sell: 5.0 }
        ];

        function formatPrice(price, isKrw = false) {
            if (!price) return '데이터 없음';
            if (isKrw) {
                return Math.round(price).toLocaleString('ko-KR') + '원';
            } else {
                return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
        }

        // Yahoo Finance 데이터 패치 (래퍼런스 코드와 완벽히 동일한 로직 적용)
        async function fetchHistory(ticker) {
            const currentUnixTime = Math.floor(Date.now() / 1000); 
            const targetUrl1 = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=0&period2=${currentUnixTime}&interval=1d&events=history`;
            const targetUrl2 = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?period1=0&period2=${currentUnixTime}&interval=1d&events=history`;

            // 래퍼런스 코드와 동일한 프록시 목록 및 순서
            const proxyList = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl1)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl1)}`,
                `https://corsproxy.io/?${encodeURIComponent(targetUrl1)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl2)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl2)}`,
                `https://thingproxy.freeboard.io/fetch/${targetUrl1}`
            ];

            let history = [];
            for (let proxy of proxyList) {
                try {
                    const response = await fetch(proxy, { method: 'GET', headers: { 'Accept': 'application/json' }});
                    if (response.ok) {
                        const textData = await response.text();
                        let data;
                        try {
                            data = JSON.parse(textData);
                        } catch (parseError) {
                            continue; // JSON 파싱 실패 시 다음 프록시 시도
                        }

                        if (data && data.chart && data.chart.result) { 
                            const result = data.chart.result[0];
                            const timestamps = result.timestamp;
                            const quotes = result.indicators.quote[0];
                            
                            // 수정종가(adjclose) 우선 적용
                            const adjcloses = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : null;

                            if (timestamps && timestamps.length > 0) {
                                for (let i = 0; i < timestamps.length; i++) {
                                    let p = adjcloses ? adjcloses[i] : quotes.close[i];
                                    
                                    // 래퍼런스 코드와 동일한 결측치 필터링
                                    if (!p || p <= 0 || !Number.isFinite(p)) continue;

                                    // UTC 기준 YYYY-MM-DD 파싱
                                    const dateObj = new Date(timestamps[i] * 1000);
                                    const yyyy = dateObj.getUTCFullYear();
                                    const mm = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
                                    const dd = String(dateObj.getUTCDate()).padStart(2, '0');

                                    history.push({ date: `${yyyy}-${mm}-${dd}`, close: p });
                                }
                            }
                            if (history.length > 0) break; // 데이터 확보 성공 시 루프 종료
                        }
                    }
                } catch (error) {
                    console.warn(`Proxy fail:`, proxy, error);
                }
            }
            return history;
        }

        // 1500일 고정 주식 매매 상태 계산 (레퍼런스와 동일 로직)
        function calculateStockState(data, buyTarget, sellTarget) {
            const period = 1500;
            const historyLog = [];

            if (data.length < period) {
                return { 
                    state: `데이터 부족 (현재: ${data.length}일)`, 
                    currentPrice: data.length > 0 ? data[data.length - 1].close : null, 
                    historyLog 
                };
            }

            const prices = data.map(d => d.close);
            
            // 시뮬레이션 상태 변수
            let isHolding = true; 
            let lastActionDateObj = new Date(data[period - 1].date);
            let lastActionType = "매수";
            let currentStateStr = "초기 보유 시작";

            for (let i = period - 1; i < data.length; i++) {
                // 이전 1500일 이평선 계산
                const slice = prices.slice(i - period + 1, i + 1);
                const ma = slice.reduce((a, b) => a + b, 0) / period;
                
                // 이격 비율 (현재가 / 이평선) 
                const disparity = prices[i] / ma;
                let actionOccurred = false;

                if (i === period - 1) {
                    actionOccurred = true;
                    currentStateStr = "초기 보유 시작";
                    lastActionDateObj = new Date(data[i].date);
                } else {
                    // 매도 조건
                    if (isHolding && disparity >= sellTarget) {
                        isHolding = false;
                        lastActionType = "매도";
                        lastActionDateObj = new Date(data[i].date);
                        currentStateStr = "매도 (Sell)";
                        actionOccurred = true;
                    } 
                    // 매수 조건
                    else if (!isHolding && disparity <= buyTarget) {
                        isHolding = true;
                        lastActionType = "매수";
                        lastActionDateObj = new Date(data[i].date);
                        currentStateStr = "매수 (Buy)";
                        actionOccurred = true;
                    }
                }

                // 매수/매도 액션이 일어나지 않은 날짜는 달력 날짜 기준으로 관망일수 계산
                if (!actionOccurred) {
                    const currentDt = new Date(data[i].date);
                    const diffTime = Math.abs(currentDt - lastActionDateObj);
                    const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (diffDays >= 365) {
                        const diffYears = (diffDays / 365.2425).toFixed(2);
                        currentStateStr = `${lastActionType} 후 관망 (${diffYears}년차)`;
                    } else {
                        currentStateStr = `${lastActionType} 후 관망 (${diffDays}일차)`;
                    }
                }

                historyLog.push({
                    date: data[i].date,
                    close: prices[i],
                    disp: disparity,
                    state: currentStateStr
                });
            }
            
            return { 
                state: historyLog[historyLog.length - 1].state, 
                currentPrice: prices[prices.length - 1], 
                historyLog 
            };
        }

        // 환율 기준일수 최적화 로직
        function findOptimalExchangeDays(prices) {
            let bestR2 = -Infinity;
            let bestDays = 20;
            for (let d = 20; d <= 500; d += 10) {
                if (prices.length < d * 2) continue;
                let ss_res = 0, sum_price = 0, count = 0;
                for (let i = d; i < prices.length; i++) {
                    let slice = prices.slice(i - d + 1, i + 1);
                    let ma = slice.reduce((a, b) => a + b, 0) / d;
                    ss_res += Math.pow(prices[i] - ma, 2);
                    sum_price += prices[i];
                    count++;
                }
                let mean_price = sum_price / count;
                let ss_tot = 0;
                for (let i = d; i < prices.length; i++) {
                    ss_tot += Math.pow(prices[i] - mean_price, 2);
                }
                let r2 = 1 - (ss_res / ss_tot);
                if (r2 > bestR2) {
                    bestR2 = r2;
                    bestDays = d;
                }
            }
            return bestDays;
        }

        function calculateExchangeState(data) {
            const prices = data.map(d => d.close);
            if (prices.length < 500) {
                return { status: `데이터 부족`, currentPrice: prices.length > 0 ? prices[prices.length - 1] : null };
            }
            const optDays = findOptimalExchangeDays(prices);
            const slice = prices.slice(prices.length - optDays);
            const ma = slice.reduce((a, b) => a + b, 0) / optDays;
            const currentPrice = prices[prices.length - 1];
            
            const ratio = currentPrice / ma;
            const status = ratio < 1.11 ? '달러로 환전!' : '지켜보기';
            return { status, currentPrice };
        }

        // CSV 다운로드 함수
        function downloadCSV(stockResults) {
            const dateMap = {};
            stockResults.forEach(stock => {
                if (!stock.historyLog) return;
                stock.historyLog.forEach(record => {
                    if (!dateMap[record.date]) dateMap[record.date] = { date: record.date };
                    dateMap[record.date][`${stock.symbol}_Price`] = record.close;
                    dateMap[record.date][`${stock.symbol}_Disp`] = record.disp;
                    dateMap[record.date][`${stock.symbol}_State`] = record.state;
                });
            });

            const dates = Object.keys(dateMap).sort();
            if (dates.length === 0) return alert("다운로드할 데이터가 없습니다.");

            let csvContent = "Date,";
            const headers = [];
            stockResults.forEach(s => {
                headers.push(`${s.symbol} Price`, `${s.symbol} 이격도`, `${s.symbol} State`);
            });
            csvContent += headers.join(",") + "\n";

            // 최신 날짜가 위로 오게 역순 정렬
            for (let i = dates.length - 1; i >= 0; i--) {
                const date = dates[i];
                const row = [date];
                stockResults.forEach(s => {
                    const data = dateMap[date];
                    row.push(data[`${s.symbol}_Price`] !== undefined ? data[`${s.symbol}_Price`].toFixed(2) : "");
                    row.push(data[`${s.symbol}_Disp`] !== undefined ? data[`${s.symbol}_Disp`].toFixed(4) : "");
                    row.push(data[`${s.symbol}_State`] || "");
                });
                csvContent += row.join(",") + "\n";
            }

            const bom = "\uFEFF"; 
            const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Data_Check_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function initApp() {
            const exchangePrices = await fetchHistory('KRW=X');
            const exState = calculateExchangeState(exchangePrices);

            const stockResults = [];
            for (let s of STOCKS) {
                const prices = await fetchHistory(s.symbol);
                const state = calculateStockState(prices, s.buy, s.sell);
                stockResults.push({ symbol: s.symbol, ...state });
            }

            let html = `
            <div class="row">
                <div class="col-title">환전여부:</div>
                <div class="col-status ${exState.status === '달러로 환전!' ? 'highlight' : ''}">${exState.status}</div>
                <div class="col-price">현재 환율: ${formatPrice(exState.currentPrice, true)}</div>
            </div>`;

            stockResults.forEach(r => {
                let statusText = r.state;
                if (r.state === '매수 (Buy)' || r.state === '초기 보유 시작') {
                    statusText = `<span class="buy">${r.state}</span>`;
                } else if (r.state === '매도 (Sell)') {
                    statusText = `<span class="sell">${r.state}</span>`;
                } else {
                    // 관망 텍스트
                    statusText = `<span class="wait">${r.state}</span>`;
                }

                html += `
                <div class="row">
                    <div class="col-title">${r.symbol}:</div>
                    <div class="col-status">${statusText}</div>
                    <div class="col-price">현재가: ${formatPrice(r.currentPrice, false)}</div>
                </div>`;
            });

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').classList.remove('loading');

            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.style.display = 'block';
            downloadBtn.addEventListener('click', () => downloadCSV(stockResults));
        }

        initApp();
    </script>
</body>
</html>
